name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggered by pushing a version tag like v1.2.0

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner (M1)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build, sign, and create DMG
        run: |
          cd $GITHUB_WORKSPACE
          bash Scripts/release.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatTimer-${{ steps.version.outputs.VERSION }}
          path: .build/release/FloatTimer-${{ steps.version.outputs.VERSION }}.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FloatTimer ${{ steps.version.outputs.VERSION }}
          body: |
            ## FloatTimer ${{ steps.version.outputs.VERSION }}

            A floating countdown timer for macOS that stays above all apps — including full-screen presentations.

            ### Install
            1. Download **FloatTimer-${{ steps.version.outputs.VERSION }}.dmg** below
            2. Open the DMG
            3. Drag **FloatTimer** to your **Applications** folder
            4. Launch from Applications (it appears in the menu bar as a timer icon)

            > **Note:** On first launch, macOS may warn about an unidentified developer.
            > Right-click the app → Open → click "Open" to allow it.

            ### Requirements
            - macOS 13.0 (Ventura) or later
            - Apple Silicon or Intel Mac
          files: .build/release/FloatTimer-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
